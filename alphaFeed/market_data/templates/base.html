<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AlphaFeed{% endblock %}</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --panel: #ffffff;
            --panel-soft: #eef3f8;
            --text: #172033;
            --muted: #667085;
            --line: #d9e2ec;
            --brand: #116149;
            --brand-strong: #0b4636;
            --accent: #d99a2b;
            --good: #14804a;
            --danger: #c2410c;
            --shadow: 0 18px 45px rgba(20, 30, 45, 0.08);
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
        }
        a { color: inherit; text-decoration: none; }
        .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(245, 247, 251, 0.92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(14px);
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 72px;
            gap: 24px;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            letter-spacing: 0;
        }
        .brand-mark {
            display: grid;
            place-items: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--brand);
            color: white;
            font-weight: 900;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 650;
        }
        .nav-links a {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            border-radius: 7px;
        }
        .nav-links a:hover { background: var(--panel-soft); color: var(--text); }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 16px;
            border-radius: 7px;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--text);
            font-weight: 750;
            font-size: 14px;
            box-shadow: 0 1px 1px rgba(20, 30, 45, 0.04);
        }
        .button.primary { background: var(--brand); border-color: var(--brand); color: white; }
        .button.primary:hover { background: var(--brand-strong); }
        .section { padding: 56px 0; }
        .eyebrow {
            color: var(--brand);
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: .08em;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .muted { color: var(--muted); }
        .pill {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--panel-soft);
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .pill.long { color: var(--good); background: #e8f6ee; }
        .pill.short { color: var(--danger); background: #fff0e8; }
        .footer {
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 14px;
            padding: 28px 0;
        }
        @media (max-width: 720px) {
            .nav { align-items: flex-start; flex-direction: column; padding: 14px 0; }
            .nav-links { width: 100%; overflow-x: auto; padding-bottom: 4px; }
            .section { padding: 36px 0; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <nav class="shell nav" aria-label="Primary navigation">
            <a class="brand" href="/">
                <span class="brand-mark">A</span>
                <span>AlphaFeed</span>
            </a>
            <div class="nav-links">
                <a href="/">Overview</a>
                <a href="/dashboard/">Dashboard</a>
                <a href="/market_data/tickers/">Assets</a>
                <a class="button primary" href="/admin/">Sign in</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="shell">AlphaFeed Intelligence Systems. Market operations dashboard for signal review and trade activity.</div>
    </footer>
</body>
</html>
